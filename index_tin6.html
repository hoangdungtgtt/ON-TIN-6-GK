<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Tin học 6 - 24 Đề (480 câu)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .controls {
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ddd;
        }

        .de-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .de-selector label {
            font-weight: 600;
            color: #333;
        }

        select {
            padding: 10px 20px;
            border: 2px solid #2ecc71;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            background: white;
            min-width: 150px;
        }

        .stats {
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            margin-left: auto;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .mode-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #2ecc71;
            color: white;
        }

        .mode-btn:not(.active) {
            background: #e0e0e0;
            color: #333;
        }

        .quiz-area {
            padding: 30px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .q-num {
            background: #2ecc71;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 18px;
        }

        .progress {
            background: #e0e0e0;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            color: #333;
        }

        .question-text {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            border-left: 5px solid #2ecc71;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-item {
            padding: 15px 20px;
            background: #f5f5f5;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .option-item.selected {
            background: #2ecc71;
            color: white;
            border-color: #27ae60;
        }

        .option-item.correct {
            background: #27ae60;
            color: white;
            border-color: #1e8449;
        }

        .option-item.wrong {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .option-item.correct-user {
            background: #27ae60;
            color: white;
            border-color: #1e8449;
        }

        .option-item.wrong-user {
            background: #f39c12;
            color: white;
            border-color: #e67e22;
        }

        .option-prefix {
            font-weight: 700;
            margin-right: 15px;
            min-width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected .option-prefix, .correct .option-prefix, .wrong .option-prefix, .correct-user .option-prefix, .wrong-user .option-prefix {
            background: rgba(255,255,255,0.2);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-prev, .btn-next {
            background: #2ecc71;
            color: white;
        }

        .btn-prev:hover:not(:disabled), .btn-next:hover:not(:disabled) {
            background: #27ae60;
            transform: scale(1.05);
        }

        .btn-prev:disabled, .btn-next:disabled {
            background: #cccccc;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            background: #1e8449;
            transform: scale(1.02);
        }

        .btn-review {
            background: #f39c12;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 10px;
        }

        .btn-review:hover {
            background: #e67e22;
        }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            border: 2px solid #2ecc71;
            display: none;
        }

        .result-area.show {
            display: block;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .result-item {
            text-align: center;
            min-width: 100px;
        }

        .result-number {
            font-size: 36px;
            font-weight: 700;
            color: #2ecc71;
        }

        .result-label {
            font-size: 14px;
            color: #666;
        }

        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        .legend-color.correct { background: #27ae60; }
        .legend-color.wrong { background: #e74c3c; }
        .legend-color.correct-user { background: #27ae60; }
        .legend-color.wrong-user { background: #f39c12; }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                margin-left: 0;
                text-align: center;
            }
            .mode-switch {
                margin-left: 0;
                justify-content: center;
            }
            .question-text {
                font-size: 18px;
            }
            .option-item {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 TRẮC NGHIỆM TIN HỌC 6</h1>
            <p>24 Đề thi - 480 câu hỏi trắc nghiệm có đáp án</p>
        </div>

        <div class="controls">
            <div class="de-selector">
                <label for="deSelect">Chọn đề:</label>
                <select id="deSelect"></select>
            </div>
            <div class="mode-switch">
                <button class="mode-btn active" id="modeTest">📝 Làm bài</button>
                <button class="mode-btn" id="modeReview">🔍 Xem đáp án</button>
            </div>
            <div class="stats" id="statsDisplay">Đề 1: 0/20</div>
        </div>

        <div class="quiz-area">
            <div class="legend" id="legend" style="display: none;">
                <div class="legend-item">
                    <div class="legend-color correct"></div>
                    <span>Đáp án đúng</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color wrong"></div>
                    <span>Đáp án sai</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color correct-user"></div>
                    <span>Bạn chọn đúng</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color wrong-user"></div>
                    <span>Bạn chọn sai</span>
                </div>
            </div>

            <div class="question-header">
                <span class="q-num" id="qNumLabel">Câu 1</span>
                <span class="progress" id="progressDisplay">1/20</span>
            </div>

            <div class="question-text" id="questionText">Đang tải câu hỏi...</div>

            <div class="options" id="optionsContainer"></div>

            <div class="nav-buttons">
                <button class="btn-prev" id="prevBtn" disabled>⬅ Câu trước</button>
                <button class="btn-next" id="nextBtn">Câu sau ➔</button>
            </div>

            <button class="btn-submit" id="submitBtn">📝 Nộp bài đề này</button>
            <button class="btn-review" id="reviewBtn" style="display: none;">🔍 Xem lại đáp án</button>

            <div class="result-area" id="resultArea">
                <h3>KẾT QUẢ ĐỀ <span id="resultDe">1</span></h3>
                <div class="result-stats">
                    <div class="result-item">
                        <div class="result-number" id="correctCount">0</div>
                        <div class="result-label">Đúng</div>
                    </div>
                    <div class="result-item">
                        <div class="result-number" id="wrongCount">0</div>
                        <div class="result-label">Sai</div>
                    </div>
                    <div class="result-item">
                        <div class="result-number" id="scorePercent">0%</div>
                        <div class="result-label">Tỉ lệ</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            ⚡ Học sinh có thể chọn đề bất kỳ từ 1 đến 24 - Nhấn "Xem đáp án" để xem lại bài làm
        </div>
    </div>

    <script>
        // =============================================
        // DỮ LIỆU 480 CÂU HỎI TIN HỌC 6
        // =============================================
        const questionsData = [];

        // ĐỀ 1 - 20 CÂU
        questionsData.push(
            { de: 1, cau: 1, text: "Sơ đồ tư duy dùng để làm gì?",
              opts: ["A. Vẽ tranh trang trí", "B. Ghi chép và hệ thống hóa thông tin", "C. Soạn thảo văn bản", "D. Tính toán số liệu"],
              correct: 1 },
            { de: 1, cau: 2, text: "Nút lệnh dùng để in đậm là:",
              opts: ["A. I", "B. B", "C. U", "D. A"],
              correct: 1 },
            { de: 1, cau: 3, text: "Vì sao cần định dạng văn bản?",
              opts: ["A. Làm file nặng hơn", "B. Dễ đọc và đẹp hơn", "C. Xóa nội dung", "D. Tăng số trang"],
              correct: 1 },
            { de: 1, cau: 4, text: "Để căn giữa tiêu đề, em cần:",
              opts: ["A. Chọn đoạn → Nhấn căn giữa", "B. Nhấn B", "C. Nhấn I", "D. Chọn màu"],
              correct: 0 },
            { de: 1, cau: 5, text: "Bảng gồm:",
              opts: ["A. Dòng và cột", "B. Hình và chữ", "C. Trang và lề", "D. Màu và chữ"],
              correct: 0 },
            { de: 1, cau: 6, text: "Bảng giúp trình bày thông tin:",
              opts: ["A. Lộn xộn", "B. Rõ ràng", "C. Khó đọc", "D. Dài hơn"],
              correct: 1 },
            { de: 1, cau: 7, text: "Ctrl + F dùng để:",
              opts: ["A. Tìm kiếm", "B. Lưu", "C. In", "D. Đóng"],
              correct: 0 },
            { de: 1, cau: 8, text: "Ctrl + H dùng để:",
              opts: ["A. In", "B. Thay thế", "C. Lưu", "D. Xóa"],
              correct: 1 },
            { de: 1, cau: 9, text: "Replace tiện lợi vì:",
              opts: ["A. Sửa nhanh nhiều chỗ", "B. Tốn thời gian", "C. Xóa file", "D. Tăng size"],
              correct: 0 },
            { de: 1, cau: 10, text: "Sổ lưu niệm thường có:",
              opts: ["A. Tiêu đề", "B. Lời chúc", "C. Hình ảnh", "D. Cả A,B,C"],
              correct: 3 },
            { de: 1, cau: 11, text: "Sổ lưu niệm đẹp khi:",
              opts: ["A. Thống nhất font", "B. Mỗi đoạn một font", "C. Không căn lề", "D. Không ảnh"],
              correct: 0 },
            { de: 1, cau: 12, text: "Hoàn thiện trang lưu niệm cần:",
              opts: ["A. Tiêu đề căn giữa", "B. Nội dung", "C. Ảnh", "D. Tất cả"],
              correct: 3 },
            { de: 1, cau: 13, text: "Sử dụng từ khóa thay vì câu dài giúp sơ đồ tư duy dễ nhớ hơn.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 14, text: "Nút lệnh B dùng để in đậm văn bản.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 15, text: "Để làm nổi bật tiêu đề, có thể tăng cỡ chữ và in đậm.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 16, text: "Bảng gồm các hàng và các cột.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 17, text: "Khi cần so sánh số liệu giữa các đối tượng, nên trình bày bằng bảng.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 18, text: "Ctrl + F là tổ hợp phím dùng để tìm kiếm.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 19, text: "Sổ lưu niệm thường có tiêu đề, nội dung và hình ảnh minh họa.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 1, cau: 20, text: "Khi hoàn thiện sổ lưu niệm, cần kiểm tra lại lỗi chính tả và định dạng trước khi in.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 }
        );

        // ĐỀ 2 - 20 CÂU
        questionsData.push(
            { de: 2, cau: 1, text: "Chủ đề chính của sơ đồ tư duy thường đặt ở đâu?",
              opts: ["A. Bên trái", "B. Bên phải", "C. Trung tâm", "D. Góc trên"],
              correct: 2 },
            { de: 2, cau: 2, text: "Lệnh căn giữa có biểu tượng:",
              opts: ["A. Các dòng lệch trái", "B. Các dòng lệch phải", "C. Các dòng nằm giữa", "D. Hai mũi tên"],
              correct: 2 },
            { de: 2, cau: 3, text: "Định dạng kí tự khác định dạng đoạn ở chỗ:",
              opts: ["A. Không có gì khác", "B. Một cái áp dụng cho chữ, một cái áp dụng cho cả đoạn", "C. Cùng áp dụng cho toàn văn bản", "D. Cùng dùng để căn lề"],
              correct: 1 },
            { de: 2, cau: 4, text: "Muốn làm nổi bật tiêu đề nên:",
              opts: ["A. Giảm cỡ chữ", "B. In nghiêng", "C. Tăng cỡ chữ và in đậm", "D. Đổi lề"],
              correct: 2 },
            { de: 2, cau: 5, text: "Ô là giao điểm của:",
              opts: ["A. Hai hàng", "B. Hai cột", "C. Hàng và cột", "D. Trang và lề"],
              correct: 2 },
            { de: 2, cau: 6, text: "Khi cần so sánh số liệu nên dùng:",
              opts: ["A. Đoạn văn", "B. Bảng", "C. Hình tròn", "D. Trang trắng"],
              correct: 1 },
            { de: 2, cau: 7, text: "Find nghĩa là:",
              opts: ["A. Lưu", "B. Tìm", "C. Đổi", "D. Xóa"],
              correct: 1 },
            { de: 2, cau: 8, text: "Replace nghĩa là:",
              opts: ["A. Tìm", "B. Thay thế", "C. Đóng", "D. Mở"],
              correct: 1 },
            { de: 2, cau: 9, text: "Nếu thay thế sai từ sẽ:",
              opts: ["A. Văn bản sai nội dung", "B. Đẹp hơn", "C. Không đổi", "D. Nhỏ hơn"],
              correct: 0 },
            { de: 2, cau: 10, text: "Chèn ảnh vào văn bản dùng thẻ:",
              opts: ["A. Home", "B. Insert", "C. View", "D. Layout"],
              correct: 1 },
            { de: 2, cau: 11, text: "Kết hợp bảng và hình giúp:",
              opts: ["A. Rõ ràng hơn", "B. Rối", "C. Nặng file", "D. Sai"],
              correct: 0 },
            { de: 2, cau: 12, text: "Muốn sửa lỗi tên lớp nhiều lần nên:",
              opts: ["A. Replace", "B. Gõ lại", "C. Xóa", "D. In"],
              correct: 0 },
            { de: 2, cau: 13, text: "Các nhánh phụ có thể nối trực tiếp từ chủ đề trung tâm mà không cần qua nhánh chính.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 2, cau: 14, text: "Nút lệnh I dùng để gạch chân chữ.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 },
            { de: 2, cau: 15, text: "Để đổi màu một từ, không cần chọn từ đó trước.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 },
            { de: 2, cau: 16, text: "Ô là giao điểm của hai cột.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 },
            { de: 2, cau: 17, text: "Trình bày một câu văn ngắn bằng bảng luôn rõ ràng hơn đoạn văn.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 },
            { de: 2, cau: 18, text: "Ctrl + H dùng để thay thế.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 0 },
            { de: 2, cau: 19, text: "Muốn chèn hình ảnh ta chọn thẻ Home.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 },
            { de: 2, cau: 20, text: "Nếu tên lớp sai nhiều lần, nên sửa từng chỗ bằng tay.",
              opts: ["A. Đúng", "B. Sai"],
              correct: 1 }
        );

        // ĐỀ 3 - 20 CÂU
        questionsData.push(
            { de: 3, cau: 1, text: "Trong sơ đồ tư duy, nhánh chính xuất phát từ đâu?",
              opts: ["A. Nhánh phụ", "B. Chủ đề trung tâm", "C. Hình ảnh minh họa", "D. Đoạn văn"],
              correct: 1 },
            { de: 3, cau: 2, text: "Thay đổi kiểu chữ là thay đổi:",
              opts: ["A. Cỡ chữ", "B. Phông chữ", "C. Màu nền", "D. Lề trang"],
              correct: 1 },
            { de: 3, cau: 3, text: "Tiêu đề nên căn giữa vì:",
              opts: ["A. Đỡ tốn giấy", "B. Dễ đọc", "C. Tạo sự nổi bật", "D. Tăng dung lượng"],
              correct: 2 },
            { de: 3, cau: 4, text: "Để đổi font chữ, em phải:",
              opts: ["A. Chọn văn bản → chọn font", "B. Nhấn Ctrl", "C. Nhấn Enter", "D. Chọn lề"],
              correct: 0 },
            { de: 3, cau: 5, text: "Để chèn bảng ta vào thẻ:",
              opts: ["A. Home", "B. Insert", "C. View", "D. Design"],
              correct: 1 },
            { de: 3, cau: 6, text: "Gộp ô tiêu đề giúp:",
              opts: ["A. Mất dữ liệu", "B. Tiêu đề nổi bật", "C. Giảm số hàng", "D. Xóa bảng"],
              correct: 1 },
            { de: 3, cau: 7, text: "Find giúp:",
              opts: ["A. Tìm từ trong văn bản", "B. Xóa", "C. In", "D. Vẽ"],
              correct: 0 },
            { de: 3, cau: 8, text: "Replace dùng khi:",
              opts: ["A. Sửa nhiều chỗ giống nhau", "B. Viết mới", "C. In", "D. Gộp bảng"],

        function getQuestionsByDe(de) {
            return questionsData.filter(q => q.de === de).sort((a, b) => a.cau - b.cau);
        }

        // Tìm global index của câu hỏi
        function findGlobalIndex(de, cau) {
            return questionsData.findIndex(q => q.de === de && q.cau === cau);
        }

        // Render câu hỏi hiện tại
        function renderQuestion() {
            const deQuestions = getQuestionsByDe(currentDe);
            if (deQuestions.length === 0) return;

            const currentQuestion = deQuestions[currentCauIndex];
            const globalIdx = findGlobalIndex(currentDe, currentQuestion.cau);

            // Cập nhật UI
            qNumLabel.textContent = `Câu ${currentQuestion.cau}`;
            progressDisplay.textContent = `${currentCauIndex + 1}/${deQuestions.length}`;
            questionText.textContent = currentQuestion.text;

            // Render options
            let optionsHtml = '';
            currentQuestion.opts.forEach((opt, idx) => {
                let selectedClass = '';
                
                if (isReviewMode && isSubmitted) {
                    // Chế độ xem đáp án
                    if (idx === currentQuestion.correct) {
                        selectedClass = 'correct';
                    }
                    if (userAnswers[globalIdx] === idx) {
                        if (userAnswers[globalIdx] === currentQuestion.correct) {
                            selectedClass = 'correct-user';
                        } else {
                            selectedClass = 'wrong-user';
                        }
                    }
                } else {
                    // Chế độ làm bài
                    selectedClass = (userAnswers[globalIdx] === idx) ? 'selected' : '';
                }
                
                optionsHtml += `
                    <div class="option-item ${selectedClass}" data-opt-index="${idx}">
                        <span class="option-prefix">${String.fromCharCode(65 + idx)}</span>
                        ${opt}
                    </div>
                `;
            });
            optionsContainer.innerHTML = optionsHtml;

            // Gán sự kiện cho options
            if (!isReviewMode || !isSubmitted) {
                document.querySelectorAll('.option-item').forEach(opt => {
                    opt.addEventListener('click', () => {
                        if (isReviewMode && isSubmitted) return;
                        
                        const optIndex = parseInt(opt.dataset.optIndex);
                        const currentQ = deQuestions[currentCauIndex];
                        const gIdx = findGlobalIndex(currentDe, currentQ.cau);
                        
                        userAnswers[gIdx] = optIndex;
                        
                        document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                        
                        updateStats();
                    });
                });
            }

            prevBtn.disabled = (currentCauIndex === 0);
            nextBtn.disabled = (currentCauIndex === deQuestions.length - 1);
            
            updateStats();
        }

        // Cập nhật thống kê
        function updateStats() {
            const deQuestions = getQuestionsByDe(currentDe);
            const answeredCount = deQuestions.filter(q => {
                const gIdx = findGlobalIndex(currentDe, q.cau);
                return userAnswers[gIdx] !== null;
            }).length;
            
            statsDisplay.textContent = `Đề ${currentDe}: ${answeredCount}/${deQuestions.length}`;
        }

        // Xử lý chọn đề
        deSelect.addEventListener('change', (e) => {
            currentDe = parseInt(e.target.value);
            currentCauIndex = 0;
            isSubmitted = false;
            isReviewMode = false;
            modeTest.classList.add('active');
            modeReview.classList.remove('active');
            legend.style.display = 'none';
            reviewBtn.style.display = 'none';
            submitBtn.style.display = 'block';
            resultArea.classList.remove('show');
            renderQuestion();
        });

        // Nút trước
        prevBtn.addEventListener('click', () => {
            if (currentCauIndex > 0) {
                currentCauIndex--;
                renderQuestion();
            }
        });

        // Nút sau
        nextBtn.addEventListener('click', () => {
            const deQuestions = getQuestionsByDe(currentDe);
            if (currentCauIndex < deQuestions.length - 1) {
                currentCauIndex++;
                renderQuestion();
            }
        });

        // Nút nộp bài
        submitBtn.addEventListener('click', () => {
            const deQuestions = getQuestionsByDe(currentDe);
            let correct = 0;
            
            deQuestions.forEach(q => {
                const gIdx = findGlobalIndex(currentDe, q.cau);
                if (userAnswers[gIdx] === q.correct) {
                    correct++;
                }
            });
            
            const wrong = deQuestions.length - correct;
            const percent = (correct / deQuestions.length * 100).toFixed(1);
            
            resultDe.textContent = currentDe;
            correctCount.textContent = correct;
            wrongCount.textContent = wrong;
            scorePercent.textContent = percent + '%';
            resultArea.classList.add('show');
            
            isSubmitted = true;
            reviewBtn.style.display = 'block';
        });

        // Nút xem đáp án
        reviewBtn.addEventListener('click', () => {
            isReviewMode = true;
            modeReview.classList.add('active');
            modeTest.classList.remove('active');
            legend.style.display = 'flex';
            renderQuestion();
        });

        // Chuyển chế độ làm bài
        modeTest.addEventListener('click', () => {
            isReviewMode = false;
            modeTest.classList.add('active');
            modeReview.classList.remove('active');
            legend.style.display = 'none';
            renderQuestion();
        });

        // Chuyển chế độ xem đáp án
        modeReview.addEventListener('click', () => {
            if (isSubmitted) {
                isReviewMode = true;
                modeReview.classList.add('active');
                modeTest.classList.remove('active');
                legend.style.display = 'flex';
                renderQuestion();
            } else {
                alert('Bạn cần nộp bài trước khi xem đáp án!');
            }
        });

        // Khởi tạo lần đầu
        renderQuestion();
    </script>
</body>
</html>
